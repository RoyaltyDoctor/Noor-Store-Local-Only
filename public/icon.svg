<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%" dir="ltr">
  <defs>
    <!-- Vibrant Purple-Pink to Deep Violet-Purple Gradient for Left Leg & Handle -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bf55ec" />
      <stop offset="40%" stop-color="#8e44ad" />
      <stop offset="100%" stop-color="#4a017e" />
    </linearGradient>

    <!-- Handle Gradient (Purple to Cyan-Blue) -->
    <linearGradient id="handleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8e44ad" />
      <stop offset="50%" stop-color="#9b5de5" />
      <stop offset="100%" stop-color="#00bbf9" />
    </linearGradient>

    <!-- Deep Midnight Blue to Indigo for Inner 3D Back-wall Shadow -->
    <linearGradient id="darkIndigoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" />
      <stop offset="50%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#090514" />
    </linearGradient>

    <!-- Shiny Turquoise Cyan to Royal Blue to Deep Cobalt Gradient for the Ribbon Flap -->
    <linearGradient id="blueCyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="50%" stop-color="#0077ff" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
  </defs>

  <!-- 1. The Arching Bag Handle on top (Scaled for high visibility) -->
  <path d="M200,150 C200,48 312,48 312,150" 
        fill="none" 
        stroke="url(#handleGrad)" 
        stroke-width="32" 
        stroke-linecap="round" />

  <!-- 2. Left Violet/Purple Section (Left leg of N-Bag) -->
  <path d="M215,145 
           H130
           C118,145 108,153 106,165
           L72,425
           C69,440 80,450 96,450
           H210
           C150,380 165,220 215,145 Z" 
        fill="url(#purpleGrad)" />

  <!-- 3. Inner 3D Deep Blue Back-wall of the Bag -->
  <path d="M235,145
           H375
           C387,145 397,153 399,165
           L433,425
           C436,440 425,450 409,450
           H235
           C185,380 190,220 235,145 Z"
        fill="url(#darkIndigoGrad)" />

  <!-- 4. Foreground Cyan-Blue Ribbon (Diagonal-to-Right Front Flap of N-Bag) -->
  <path d="M235,145
           H318
           C288,210 322,330 397,440
           C402,447 396,450 388,450
           H235
           C185,380 190,220 235,145 Z"
        fill="url(#blueCyanGrad)" />

  <!-- 5. The Elegant Sweeping White Gap Dividing Purple and Cyan-Blue Fold (Creates the N-letter) -->
  <path d="M215,145
           C215,145 220,145 235,145
           C185,220 180,380 235,450
           H210
           C150,380 165,220 215,145 Z" 
        fill="#ffffff" />
</svg>
